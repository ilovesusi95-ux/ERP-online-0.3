<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP-online 0.3 | 医疗耗材厂家 ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
        .modal { animation: fadeInScale 0.2s ease-out forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .tag { background: #e0f2fe; color: #0369a1; padding: 2px 10px; border-radius: 9999px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-screen-2xl mx-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">ERP-online 0.3</h1>
                <p class="text-slate-500">医疗耗材厂家 · 注册证管理</p>
            </div>
            <button onclick="showAddCertificateModal()" class="px-6 py-3 bg-emerald-600 text-white rounded-2xl flex items-center gap-x-3">
                <i class="fa-solid fa-plus"></i> <span>新增注册证</span>
            </button>
        </div>

        <div class="bg-white rounded-3xl border shadow-sm">
            <table class="w-full">
                <thead class="bg-slate-50">
                    <tr class="text-xs text-slate-500">
                        <th class="px-8 py-5 text-left">注册证号</th>
                        <th class="px-8 py-5">持证企业</th>
                        <th class="px-8 py-5">有效期</th>
                        <th class="px-8 py-5">型号数量</th>
                        <th class="px-8 py-5 w-32"></th>
                    </tr>
                </thead>
                <tbody id="certificates-table" class="divide-y text-sm"></tbody>
            </table>
        </div>
    </div>

    <!-- 主弹窗 -->
    <div id="modal" onclick="if(event.target.id==='modal') hideModal()" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl w-full max-w-2xl mx-4 shadow-2xl max-h-[92vh] overflow-auto" id="modal-content"></div>
    </div>

    <script>
        let data = { certificates: [] };

        function loadData() {
            const saved = localStorage.getItem('erp_cert_v3');
            if (saved) data = JSON.parse(saved);
            else {
                data.certificates = [
                    {id:1, certNo:"国械注准20263000001", holder:"华康医疗耗材有限公司", validityMonths:36, models:[
                        {name:"普通型", specs:["医用外科口罩"], configs:[{name:"配置一", values:["无菌","非无菌"]}] }
                    ]}
                ];
                saveData();
            }
        }

        function saveData() { localStorage.setItem('erp_cert_v3', JSON.stringify(data)); }

        function renderCertificates() {
            const tbody = document.getElementById('certificates-table');
            tbody.innerHTML = '';
            data.certificates.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-8 py-5 font-mono text-emerald-700">${c.certNo}</td>
                    <td class="px-8 py-5">${c.holder}</td>
                    <td class="px-8 py-5"><span class="px-3 py-1 text-xs rounded-full bg-emerald-100 text-emerald-700">${c.validityMonths}个月</span></td>
                    <td class="px-8 py-5">${c.models.length} 个型号</td>
                    <td class="px-8 py-5"><button onclick="viewCertificate(${c.id})" class="text-sky-600 text-xs px-4 py-2">查看</button> <button onclick="editCertificate(${c.id})" class="text-sky-600 text-xs px-4 py-2">编辑</button> <button onclick="deleteCertificate(${c.id})" class="text-red-500 text-xs px-4 py-2">删除</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showAddCertificateModal(editId = null) {
            const isEdit = !!editId;
            const cert = isEdit ? data.certificates.find(x => x.id === editId) : {certNo:'', holder:'', validityMonths:24, models:[]};
            window.tempCert = cert;

            let modelsHtml = '';
            if (cert.models && cert.models.length > 0) {
                modelsHtml = cert.models.map((m, idx) => `
                    <div class="border rounded-2xl p-4 mb-3 flex justify-between items-center">
                        <div>
                            <div class="font-semibold">${m.name}</div>
                            <div class="text-xs text-slate-500">规格：${m.specs.length} | 配置：${m.configs.length}</div>
                        </div>
                        <div class="flex gap-x-2">
                            <button onclick="editModel(${idx})" class="text-sky-600 text-xs px-3 py-1">编辑</button>
                            <button onclick="removeModel(${idx})" class="text-red-500 text-xs px-3 py-1">删除</button>
                        </div>
                    </div>
                `).join('');
            }

            const html = `
                <div class="p-8">
                    <h3 class="text-2xl font-bold mb-7">${isEdit ? '编辑' : '新增'}注册证</h3>
                    
                    <div class="grid grid-cols-2 gap-5">
                        <div><label class="block text-sm mb-2">注册证号</label><input id="cert-no" class="w-full border rounded-2xl px-5 py-3.5" value="${cert.certNo}"></div>
                        <div><label class="block text-sm mb-2">持证企业</label><input id="cert-holder" class="w-full border rounded-2xl px-5 py-3.5" value="${cert.holder}"></div>
                        <div><label class="block text-sm mb-2">有效期（个月）</label><input id="cert-months" type="number" class="w-full border rounded-2xl px-5 py-3.5" value="${cert.validityMonths}"></div>
                    </div>

                    <div class="mt-8">
                        <div class="flex justify-between items-center mb-4">
                            <div class="font-semibold">型号列表</div>
                            <button onclick="showAddModelModal()" class="px-5 py-2 bg-sky-600 text-white text-sm rounded-2xl">+ 添加型号</button>
                        </div>
                        <div class="border rounded-2xl p-4 min-h-[120px]">
                            ${modelsHtml || '<div class="text-center text-slate-400 py-8">暂无型号，请添加</div>'}
                        </div>
                    </div>

                    <div class="flex gap-x-4 mt-8">
                        <button onclick="hideModal()" class="flex-1 py-3.5 border rounded-2xl">取消</button>
                        <button onclick="saveCertificate(${isEdit ? editId : 'null'})" class="flex-1 py-3.5 bg-emerald-600 text-white rounded-2xl">保存注册证</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function showAddModelModal(modelIndex = null) {
            const isEditModel = modelIndex !== null;
            const model = isEditModel ? window.tempCert.models[modelIndex] : {name:'', specs:[], configs:[]};

            let configHtml = '';
            if (model.configs && model.configs.length > 0) {
                configHtml = model.configs.map((c, i) => `
                    <div class="mb-4">
                        <label class="block text-sm mb-2">${c.name}</label>
                        <input id="config-val-${i}" class="w-full border rounded-2xl px-5 py-3.5" value="${c.values.join(',')}">
                    </div>
                `).join('');
            } else {
                configHtml = `<div class="mb-4"><label class="block text-sm mb-2">配置一</label><input id="config-val-0" class="w-full border rounded-2xl px-5 py-3.5" placeholder="无菌,非无菌"></div>`;
            }

            const html = `
                <div class="p-8">
                    <h3 class="text-xl font-bold mb-6">${isEditModel ? '编辑型号' : '添加型号'}</h3>
                    <div class="space-y-5">
                        <div><label class="block text-sm mb-2">型号名称</label><input id="model-name" class="w-full border rounded-2xl px-5 py-3.5" value="${model.name}"></div>
                        
                        <div><label class="block text-sm mb-2">规格（多个用逗号分隔）</label><input id="model-specs" class="w-full border rounded-2xl px-5 py-3.5" value="${model.specs.join(',')}"></div>

                        <div id="config-container">
                            ${configHtml}
                        </div>
                        <button onclick="addMoreConfigField()" class="text-sky-600 text-sm">+ 添加更多配置项</button>
                    </div>

                    <div class="flex gap-x-4 mt-8">
                        <button onclick="hideModal()" class="flex-1 py-3.5 border rounded-2xl">取消</button>
                        <button onclick="saveModel(${isEditModel ? modelIndex : 'null'})" class="flex-1 py-3.5 bg-emerald-600 text-white rounded-2xl">保存型号</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function addMoreConfigField() {
            const container = document.getElementById('config-container');
            const count = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'mb-4';
            div.innerHTML = `<label class="block text-sm mb-2">配置${count}</label><input id="config-val-${count-1}" class="w-full border rounded-2xl px-5 py-3.5">`;
            container.appendChild(div);
        }

        function saveModel(modelIndex) {
            const name = document.getElementById('model-name').value || '未命名型号';
            const specsStr = document.getElementById('model-specs').value;
            const specs = specsStr ? specsStr.split(',').map(s => s.trim()).filter(Boolean) : [];

            const configs = [];
            const container = document.getElementById('config-container');
            for (let i = 0; i < container.children.length; i++) {
                const input = document.getElementById('config-val-' + i);
                if (input && input.value.trim()) {
                    const values = input.value.split(',').map(s => s.trim()).filter(Boolean);
                    if (values.length > 0) {
                        configs.push({name: `配置${i+1}`, values});
                    }
                }
            }

            if (!window.tempCert.models) window.tempCert.models = [];

            if (modelIndex !== null) {
                window.tempCert.models[modelIndex] = {name, specs, configs};
            } else {
                window.tempCert.models.push({name, specs, configs});
            }

            hideModal();
            setTimeout(() => showAddCertificateModal(window.tempCert.id || null), 250);
        }

        function editModel(idx) {
            showAddModelModal(idx);
        }

        function removeModel(idx) {
            if (window.tempCert.models) {
                window.tempCert.models.splice(idx, 1);
                hideModal();
                setTimeout(() => showAddCertificateModal(window.tempCert.id || null), 200);
            }
        }

        function saveCertificate(editId) {
            const certNo = document.getElementById('cert-no').value || '新注册证';
            const holder = document.getElementById('cert-holder').value || '未知企业';
            const validityMonths = parseInt(document.getElementById('cert-months').value) || 24;

            if (editId) {
                const c = data.certificates.find(x => x.id === editId);
                c.certNo = certNo;
                c.holder = holder;
                c.validityMonths = validityMonths;
                c.models = window.tempCert.models || [];
            } else {
                data.certificates.push({id: Date.now(), certNo, holder, validityMonths, models: window.tempCert.models || []});
            }
            saveData();
            hideModal();
            renderCertificates();
        }

        function editCertificate(id) {
            showAddCertificateModal(id);
        }

        function deleteCertificate(id) {
            if (!confirm('确定删除这个注册证吗？')) return;
            data.certificates = data.certificates.filter(x => x.id !== id);
            saveData();
            renderCertificates();
        }

        function viewCertificate(id) {
            const c = data.certificates.find(x => x.id === id);
            if (!c) return;

            let modelsHtml = c.models.length > 0 ? c.models.map(m => `
                <div class="border rounded-2xl p-5 mb-4">
                    <div class="font-bold text-lg">${m.name}</div>
                    <div class="mt-2 text-sm"><span class="font-medium">规格：</span> ${m.specs.join('、') || '无'}</div>
                    <div class="mt-2">
                        ${m.configs.map(cfg => `<div class="text-sm"><span class="font-medium">${cfg.name}：</span> ${cfg.values.join('、')}</div>`).join('')}
                    </div>
                </div>
            `).join('') : '<div class="text-center py-8 text-slate-400">暂无型号</div>';

            const html = `<div class="p-8"><h3 class="text-2xl font-bold mb-6">${c.certNo}</h3><div class="text-sm text-slate-500 mb-6">${c.holder} · 有效期 ${c.validityMonths}个月</div><div class="font-semibold mb-4">型号详情</div>${modelsHtml}<div class="mt-8"><button onclick="hideModal()" class="w-full py-3.5 border rounded-2xl">关闭</button></div></div>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function hideModal() {
            const m = document.getElementById('modal');
            m.classList.remove('flex');
            m.classList.add('hidden');
        }

        function init() {
            loadData();
            renderCertificates();
            console.log('%c[ERP v0.3] 型号列表 + 配置版已加载', 'color:#0ea5e9');
        }

        window.onload = init;
    </script>
</body>
</html>
